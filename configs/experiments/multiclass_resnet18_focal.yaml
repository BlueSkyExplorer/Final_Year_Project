experiment_name: multiclass_resnet18_focal
model:
  paradigm: multiclass
  backbone: resnet18
  loss: focal
  head_dropout: 0.0
  gamma: 2.0
  alpha: [0.25, 0.35, 0.50, 0.30]
training:
  batch_size: 16
  num_epochs: 40
  learning_rate: 1e-4
  backbone_learning_rate: 5e-5
  freeze_epochs: 5
  weight_decay: 1e-4
  early_stopping_patience: 7
  early_stopping_min_delta: 0.001
cv:
  num_folds: 5
  current_fold: 0
paths:
  dataset_config: configs/dataset/limuc.yaml
  output_root: results
